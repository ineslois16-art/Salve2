<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Salverys — Espace partenaire — Télésecrétariat médical</title>
<link rel="stylesheet" href="assets/site.css" />
<style>
  .ec-wrap { max-width: 860px; margin: 0 auto; padding: 48px 20px 80px; }
  .ec-lock { max-width: 420px; margin: 10vh auto 0; text-align: center; }
  .ec-lock h1 { font-size: 26px; margin-bottom: 8px; }
  .ec-lock p { color: var(--text-soft); font-size: 14.5px; margin-bottom: 22px; }
  .ec-lock input[type="password"] {
    width: 100%; padding: 13px 16px; font-size: 16px; border: 1.5px solid var(--line, #d8ded8);
    border-radius: 10px; margin-bottom: 12px; box-sizing: border-box;
  }
  .ec-error { color: #b3261e; font-size: 13.5px; min-height: 18px; margin-top: 10px; }
  .ec-actions { display: flex; gap: 12px; justify-content: flex-end; margin: 18px 0 26px; }
  .ec-doc h1 { font-size: 28px; margin: 8px 0 10px; }
  .ec-doc h2 { font-size: 19px; margin: 30px 0 10px; }
  .ec-doc .ec-lead { font-size: 16px; color: var(--text-soft); }
  .ec-doc ul { padding-left: 20px; } .ec-doc li { margin: 6px 0; }
  .ec-confidentiel {
    background: #fff6e8; border: 1px solid #e8c98a; color: #7a5410; border-radius: 8px;
    padding: 8px 14px; font-size: 12.5px; font-weight: 600; letter-spacing: .3px;
    text-transform: uppercase; margin-bottom: 22px;
  }
  .ec-table { width: 100%; border-collapse: collapse; margin: 12px 0 6px; font-size: 15px; }
  .ec-table th, .ec-table td { border: 1px solid var(--line, #d8ded8); padding: 9px 12px; text-align: left; }
  .ec-table th { background: var(--soft, #f2f5f2); }
  .ec-note { font-size: 13px; color: var(--text-soft); }
  .ec-cta { margin-top: 30px; padding: 16px 18px; background: var(--soft, #f2f5f2); border-radius: 10px; }
  @media print {
    .nav, .footer, .ec-actions, .ec-lock { display: none !important; }
    .ec-wrap { padding: 0; max-width: none; }
    .ec-doc { font-size: 12px; }
    .ec-doc h1 { font-size: 20px; } .ec-doc h2 { font-size: 15px; margin-top: 18px; }
    .ec-table { font-size: 12px; }
    a { color: inherit; text-decoration: none; }
  }
</style>
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <a class="brand" href="index.html"><img class="brand-logo" src="assets/logo-salverys.svg" alt="Salverys" /></a>
    <nav class="nav-links"><a href="index.html">Accueil</a><a href="espace-client.html">Espaces partenaires</a><a href="espace-candidat.html">Nous rejoindre</a></nav>
  </div>
</header>

<div class="ec-wrap">

  <div class="ec-lock" id="ec-lock">
    <h1>Espace partenaire — Télésecrétariat médical</h1>
    <p>Réservé aux partenaires Salverys. Le code d'accès vous a été remis lors du cadrage.</p>
    <form id="ec-form">
      <input type="password" id="ec-pass" placeholder="Code d'accès" autocomplete="current-password" autofocus />
      <button type="submit" class="btn btn-primary" style="display:block;margin:0 auto;padding:13px 44px;">Déverrouiller</button>
      <div class="ec-error" id="ec-error"></div>
    </form>
  </div>

  <div id="ec-content" hidden>
    <div class="ec-actions">
      <button class="btn btn-outline" id="ec-print">Imprimer / PDF de cadrage</button>
      <button class="btn btn-outline" id="ec-logout">Verrouiller</button>
    </div>
    <div id="mb-content"></div>
  </div>

</div>

<footer class="footer">
  <div class="container"><div class="footer-meta"><span>© Salverys — espace partenaires</span><span>Document confidentiel</span></div></div>
</footer>

  var $ = function (id) { return document.getElementById(id); };
  var SS_KEY = 'salverys_ec_pw_medical';

  function show(html) {
    $('mb-content').innerHTML = html;
    var d = document.getElementById('ec-date');
    if (d) d.textContent = new Date().toLocaleDateString('fr-FR', { year: 'numeric', month: 'long', day: 'numeric' });
    $('ec-lock').hidden = true;
    $('ec-content').hidden = false;
  }

  async function unlock(pw) {
    var enc = new TextEncoder();
    var km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    var key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: b64(VAULT.salt), iterations: VAULT.iter, hash: 'SHA-256' },
      km, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
    var plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64(VAULT.iv) }, key, b64(VAULT.data));
    return new TextDecoder().decode(plain);
  }

  $('ec-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var pw = $('ec-pass').value;
    $('ec-error').textContent = '';
    unlock(pw).then(function (html) {
      try { sessionStorage.setItem(SS_KEY, pw); } catch (_) {}
      show(html);
    }).catch(function () {
      $('ec-error').textContent = 'Code d’accès incorrect.';
    });
  });

  $('ec-print').addEventListener('click', function () { window.print(); });
  $('ec-logout').addEventListener('click', function () {
    try { sessionStorage.removeItem(SS_KEY); } catch (_) {}
    location.reload();
  });

  /* Déverrouillage auto si déjà ouvert dans cette session */
  try {
    var saved = sessionStorage.getItem(SS_KEY);
    if (saved) unlock(saved).then(show).catch(function () { sessionStorage.removeItem(SS_KEY); });
  } catch (_) {}

  if (!window.isSecureContext) {
    $('ec-error').textContent = 'Cette page nécessite HTTPS (ou localhost).';
  }
})();
